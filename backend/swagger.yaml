  # ==================== Audit Logs ====================
  /audit-logs:
    get:
      tags:
        - Audit Logs
      summary: Get audit logs
      description: Get audit logs with filtering (superadmin only)
      parameters:
        - name: page
          in: query
          description: Page number
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          description: Items per page
          schema:
            type: integer
            default: 50
        - name: user_id
          in: query
          description: Filter by user ID
          schema:
            type: integer
        - name: action
          in: query
          description: Filter by action type
          schema:
            type: string
        - name: entity_type
          in: query
          description: Filter by entity type
          schema:
            type: string
        - name: start_date
          in: query
          description: Filter from date (ISO 8601)
          schema:
            type: string
            format: date-time
        - name: end_date
          in: query
          description: Filter to date (ISO 8601)
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Audit logs retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                            user_id:
                              type: integer
                            user_email:
                              type: string
                            action:
                              type: string
                            entity_type:
                              type: string
                            entity_id:
                              type: integer
                            details:
                              type: string
                            created_at:
                              type: string
                              format: date-time

  /audit-logs/filters:
    get:
      tags:
        - Audit Logs
      summary: Get audit log filter options
      description: Get available filter options for audit logs (superadmin only)
      responses:
        '200':
          description: Filter options retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  actions:
                    type: array
                    items:
                      type: string
                  entity_types:
                    type: array
                    items:
                      type: string
                  users:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        email:
                          type: string

  /audit-logs/stats:
    get:
      tags:
        - Audit Logs
      summary: Get audit log statistics
      description: Get statistics about audit logs (superadmin only)
      responses:
        '200':
          description: Statistics retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  by_action:
                    type: array
                    items:
                      type: object
                      properties:
                        action:
                          type: string
                        count:
                          type: integer
                  by_entity:
                    type: array
                    items:
                      type: object
                      properties:
                        entity_type:
                          type: string
                        count:
                          type: integer

  /audit-logs/cleanup:
    post:
      tags:
        - Audit Logs
      summary: Cleanup old audit logs
      description: Delete audit logs older than specified date (superadmin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - before_date
              properties:
                before_date:
                  type: string
                  format: date-time
                  description: Delete logs older than this date
      responses:
        '200':
          description: Cleanup completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                    description: Number of records deleted
