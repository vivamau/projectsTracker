services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: projectstracker-backend
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_PATH=/app/data/database.sqlite
      - JWT_SECRET=${JWT_SECRET:-change-this-to-a-secure-random-string}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-2h}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost}
    volumes:
      - db_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-}
    container_name: projectstracker-frontend
    environment:
      - BACKEND_URL=http://backend:5000
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
    driver: local
