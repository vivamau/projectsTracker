services:
  # Backend API Service
  - type: web
    name: projectstracker-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: starter
    disk:
      name: sqlite-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DB_PATH
        value: /app/data/database.sqlite
      - key: JWT_SECRET
        generateValue: true
        description: "Automatically generated secure JWT secret"
      - key: JWT_EXPIRES_IN
        value: 2h
      - key: CORS_ORIGIN
        value: https://projectstracker-frontend.onrender.com
        description: "Frontend service URL (Render auto-generates from service name)"
    healthCheckPath: /health

  # Frontend Service (React SPA + Nginx Proxy)
  - type: web
    name: projectstracker-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    region: oregon
    plan: starter
    envVars:
      - key: BACKEND_URL
        value: https://projectstracker-api.onrender.com
        description: "Backend service URL (Render auto-generates from service name)"
